<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ratbat</title>
<meta name="description" content="Ratbat — personal radio. Tune in to any Ratbat broadcaster's live station.">
<meta name="theme-color" content="#ffffff">
<meta property="og:title" content="Ratbat">
<meta property="og:description" content="Personal radio — tune in to a live station.">
<meta property="og:type" content="website">
<meta property="og:image" content="/web-app-manifest-512x512.png">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Ratbat">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>
</head>
<body>

<header>
  <h1>Ratbat</h1>
  <p>Personal radio.</p>
</header>

<main id="stations" aria-label="Live stations" aria-live="polite">
  <p class="empty">Loading…</p>
</main>

<footer class="player" id="player" hidden>
  <div class="now">
    <b id="track-title">—</b>
    <span id="track-artist"></span>
    <small id="active-station-name"></small>
  </div>
  <audio id="audio" controls aria-label="Radio player"></audio>
</footer>

<footer class="credit">
  <small>Broadcast by <a href="https://github.com/jonasjohansson/ratbat">Ratbat</a>.</small>
</footer>

</body>
</html>
