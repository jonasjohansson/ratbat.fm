<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ratbat">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/style.css">
    <script src="/app.js" defer></script>
    <title>Ratbat — Personal Radio</title>
</head>
<body>
    <main class="app">
        <header class="header">
            <h1>Ratbat</h1>
            <p class="tagline">Personal Radio</p>
        </header>

        <section class="stations" aria-label="Stations">
            <div id="station-list" class="station-list">
                <div class="empty">Loading stations…</div>
            </div>
        </section>

        <section class="player" aria-label="Player" hidden id="player-section">
            <div class="now-playing">
                <span class="label">Now Playing</span>
                <strong id="track-title">—</strong>
                <span class="artist" id="track-artist">—</span>
                <span class="album" id="track-album"></span>
            </div>

            <audio id="audio" preload="none" crossorigin="anonymous"></audio>

            <div class="controls">
                <button id="play-pause" class="btn-primary" aria-label="Play/Pause">▶</button>
                <div class="volume">
                    <span>🔊</span>
                    <input id="volume" type="range" min="0" max="100" value="80" aria-label="Volume">
                </div>
            </div>

            <div class="station-label">Playing from: <span id="active-station-name">—</span></div>
        </section>

        <footer>
            <p>Broadcast by <a href="https://github.com/jonasjohansson/ratbat">Ratbat</a></p>
        </footer>
    </main>
</body>
</html>
